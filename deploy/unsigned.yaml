# The denied case: a normal, popular public image (nginx) pinned by digest.
# Nothing wrong with nginx itself — the point is it was NOT built or signed by
# our pipeline, so it has no cosign signature from our CI identity. The Phase-5
# policy refuses it before it can schedule, proving the namespace only runs
# images that came through our supply chain.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nahui-app-unsigned
  namespace: nahui
  labels:
    app: nahui-app-unsigned
    nahui.dev/trust: unsigned
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nahui-app-unsigned
  template:
    metadata:
      labels:
        app: nahui-app-unsigned
    spec:
      containers:
        - name: app
          # Untrusted image: digest-pinned, but never signed by our pipeline.
          image: nginx@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
          ports:
            - containerPort: 80
